<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Colldett Trace Limited | Coming Soon</title>
  <meta name="description" content="Colldett Trace Limited is preparing something better. Our refreshed experience is coming soon.">
  <link rel="icon" type="image/png" href="public/uploads/favicon.png">
  <style>
    :root {
      --green: #215e1d;
      --green-deep: #163f14;
      --gold: #dfb01a;
      --ink: #122014;
      --light: #f7fbf6;
      --line: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color: #fff;
      background: #0a180d;
      overflow: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 12% 16%, rgba(223, 176, 26, 0.3), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(33, 94, 29, 0.45), transparent 34%),
        linear-gradient(130deg, #0b1f0d, #123614 45%, #0c240f 100%);
      isolation: isolate;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      inset: -20%;
      z-index: -1;
      background:
        conic-gradient(from 0deg, rgba(223, 176, 26, 0.18), rgba(33, 94, 29, 0.08), rgba(223, 176, 26, 0.18));
      filter: blur(30px);
      animation: spin 18s linear infinite;
    }

    .page::after {
      inset: -30%;
      opacity: 0.7;
      animation-direction: reverse;
      animation-duration: 30s;
    }

    .card {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: clamp(24px, 4vw, 44px);
      background: linear-gradient(140deg, rgba(17, 45, 20, 0.88), rgba(11, 31, 14, 0.9));
      backdrop-filter: blur(8px);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      text-align: center;
      animation: floatIn 1s ease both;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      animation: pulseGlow 3.2s ease-in-out infinite;
    }

    .logo {
      height: 56px;
      width: auto;
      display: block;
    }

    .kicker {
      margin: 0;
      color: #f5d06a;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      font-size: 0.78rem;
    }

    h1 {
      margin: 12px 0 12px;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.06;
      text-wrap: balance;
    }

    .accent {
      color: var(--gold);
      text-shadow: 0 0 16px rgba(223, 176, 26, 0.35);
    }

    .lead {
      margin: 0 auto;
      max-width: 54ch;
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      color: rgba(232, 244, 230, 0.92);
      line-height: 1.6;
    }

    .dots {
      margin: 26px auto 0;
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 0 0 rgba(223, 176, 26, 0.45);
      animation: blink 1.6s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .foot {
      margin-top: 24px;
      font-size: 0.9rem;
      color: rgba(210, 229, 209, 0.88);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(223, 176, 26, 0.2); transform: translateY(0); }
      50% { box-shadow: 0 0 28px rgba(223, 176, 26, 0.28); transform: translateY(-2px); }
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes blink {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 8px rgba(223, 176, 26, 0); }
    }

    @media (max-width: 520px) {
      .page { padding: 14px; }
      .card { border-radius: 18px; }
      .logo { height: 48px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Coming soon announcement">
      <div class="logo-wrap">
        <img class="logo" src="public/uploads/logo.png" alt="Colldett Trace Limited logo">
      </div>
      <p class="kicker">Colldett Trace Limited</p>
      <h1>Something <span class="accent">Amazing</span> Is Coming Soon</h1>
      <p class="lead">We are preparing an improved digital experience for debt recovery, asset tracing, and investigations. Please check back shortly.</p>
      <div class="dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <p class="foot">Thank you for your patience.</p>
    </section>
  </main>
</body>
</html>
